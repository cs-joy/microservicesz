version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - .:/app

  worker:
    build: .
    command: celery -A app.celery_app worker --loglevel=info --pool=prefork
    environment:
      - PYTHONPATH=/app
    depends_on:
      - redis
    volumes:
      - .:/app

  beat:
    build: .
    command: celery -A app.celery_app beat --loglevel=info
    environment:
      - PYTHONPATH=/app
    depends_on:
      - redis
      - worker
    volumes:
      - .:/app
